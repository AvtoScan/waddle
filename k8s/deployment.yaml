apiVersion: apps/v1
kind: Deployment
metadata:
  name: waddle
  labels:
    app: waddle
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: waddle
      component: frontend
  template:
    metadata:
      labels:
        app: waddle
        component: frontend
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          volumeMounts:
            - name: static
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: status
              mountPath: /usr/share/nginx/html/status.json
              subPath: status.json
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: static
          configMap:
            name: waddle-app
        - name: status
          persistentVolumeClaim:
            claimName: waddle-status
        - name: nginx-config
          configMap:
            name: waddle-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: waddle
  labels:
    app: waddle
spec:
  selector:
    app: waddle
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
